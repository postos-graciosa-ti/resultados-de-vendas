name: Build Multi-Platform (Android & Windows)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: |
          pip install "flet[cli]==0.84.0" httpx

      - name: Build APK
        run: |
          flet build apk \
            --project "MapaDesempenho" \
            --org "com.suaempresa" \
            --build-version "1.0.0" \
            --build-number "${{ github.run_number }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mapa-desempenho-apk
          path: build/apk/*.apk
          retention-days: 30

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install "flet[cli]==0.84.0" httpx

      - name: Build Windows
        run: |
          flet build windows `
            --project "MapaDesempenho" `
            --build-version "1.0.0" `
            --build-number "${{ github.run_number }}"

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: mapa-desempenho-windows
          path: build/windows/
          retention-days: 30